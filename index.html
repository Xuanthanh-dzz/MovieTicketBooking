<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CGV Clone - Trạm Thử Nghiệm Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #e74c3c; }
        button { background-color: #2ecc71; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #27ae60; }
        #result-box { margin-top: 20px; padding: 15px; background: #2c3e50; color: #2ecc71; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 HỆ THỐNG ĐẶT VÉ PHIM CGV (FRONTEND TEST)</h2>
    <p>Bấm nút bên dưới để chọc vào Backend .NET và lấy danh sách phim từ Docker SQL Server:</p>
    
    <button onclick="layDanhSachPhim()">🔄 Tải Danh Sách Phim</button>

    <h3>📦 Kết quả trả về từ Backend:</h3>
    <div id="result-box">Chưa có dữ liệu. Hãy bấm nút phía trên!</div>
</div>

<script>
    async function layDanhSachPhim() {
        const resultBox = document.getElementById('result-box');
        resultBox.innerText = "Đang kết nối đến Backend...";

        try {
            // Giao thức JavaScript Fetch chọc thẳng vào cổng HTTPS bảo mật của Backend
            // Chú ý: Cổng HTTPS của máy bạn hiện tại đang là 7083 nhé!
            const response = await fetch('https://localhost:7083/api/movie');
            
            if (!response.ok) {
                throw new Error(`Lỗi kết nối Server: ${response.status}`);
            }

            const data = await response.json(); // Biến gói tin HTTP thành dữ liệu JSON
            
            // Ép dữ liệu thành chuỗi chữ sạch sẽ để phun ra màn hình
            resultBox.innerText = JSON.stringify(data, null, 2);
            resultBox.style.color = "#2ecc71"; // Màu xanh lá cây nếu thành công
        } catch (error) {
            resultBox.innerText = "❌ THẤT BẠI: " + error.message + "\n(Hãy chắc chắn Backend .NET đang bật và cổng HTTPS chính xác!)";
            resultBox.style.color = "#e74c3c"; // Màu đỏ nếu thất bại
        }
    }
</script>

</body>
</html>
